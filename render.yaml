services:
  - type: web
    name: wildshield-api
    runtime: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && python download_models.py"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.0
      - key: KMP_DUPLICATE_LIB_OK
        value: "TRUE"
    healthCheckPath: /health
